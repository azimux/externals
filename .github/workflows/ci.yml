name: test-unit and rubocop

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    name: test-unit and rubocop
    strategy:
      matrix:
        ruby: [ '3.0', '3.1', '3.2', '3.3' ]
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v3
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run test-unit
        run: bundle exec test unit
